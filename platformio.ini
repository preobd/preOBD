; PlatformIO Project Configuration File
; Build configurations for different hardware platforms

[platformio]
default_envs = teensy41

; ============================================================================
; SHARED CONFIGURATIONS
; ============================================================================

; Common settings for all environments
[env]
framework = arduino
monitor_speed = 115200
monitor_echo = yes

; ============================================================================
; LIBRARY DEPENDENCY GROUPS
; ============================================================================

; Core libraries (always needed)
[core_libs]
lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.9

; Display libraries
[display_libs]
lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

; CAN libraries (MCP2515 via SPI)
[can_libs]
lib_deps =
    sandeepmistry/CAN@^0.3.1

; SD card library
[sd_libs]
lib_deps =
    greiman/SdFat

; Sensor libraries
[sensor_libs]
lib_deps =
    adafruit/Adafruit BME280 Library@^2.2.2

; EEPROM/JSON configuration (not needed for static builds)
[eeprom_libs]
lib_deps =
    bblanchon/ArduinoJson@^7.2.1

; ============================================================================
; FEATURE FLAG SETS
; ============================================================================

; Standard feature set (all outputs enabled)
[standard_features]
build_flags =
    -D ENABLE_CAN
    -D ENABLE_REALDASH
    -D ENABLE_SERIAL_OUTPUT
    -D ENABLE_SD_LOGGING
    -D ENABLE_LCD
    -D ENABLE_ALARMS

; Minimal feature set for memory-constrained boards
[minimal_features]
build_flags =
    -D ENABLE_LCD
    -D ENABLE_SERIAL_OUTPUT

; ============================================================================
; TEENSY 4.1 (RECOMMENDED PLATFORM)
; ============================================================================

[env:teensy41]
platform = teensy
board = teensy41
build_flags =
    -D TEENSY_41
    -D USE_FLEXCAN_NATIVE
    -D SD_CS_PIN=254                    ; Built-in SD card
    ${standard_features.build_flags}
    -O2
    -Wall
lib_deps =
    ${core_libs.lib_deps}
    ${display_libs.lib_deps}
    ${can_libs.lib_deps}
    ${sd_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    https://github.com/tonton81/WDT_T4.git

; ============================================================================
; TEENSY 4.0
; ============================================================================

[env:teensy40]
platform = teensy
board = teensy40
build_flags =
    -D TEENSY_40
    -D USE_FLEXCAN_NATIVE
    ${standard_features.build_flags}
    -O2
    -Wall
lib_deps =
    ${core_libs.lib_deps}
    ${display_libs.lib_deps}
    ${can_libs.lib_deps}
    ${sd_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    https://github.com/tonton81/WDT_T4.git

; ============================================================================
; TEENSY 3.6
; ============================================================================

[env:teensy36]
platform = teensy
board = teensy36
build_flags =
    -D TEENSY_36
    ${standard_features.build_flags}
    -O2
    -Wall
lib_deps =
    ${core_libs.lib_deps}
    ${display_libs.lib_deps}
    ${can_libs.lib_deps}
    ${sd_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git

; ============================================================================
; ARDUINO MEGA 2560
; ============================================================================

[env:mega2560]
platform = atmelavr
board = megaatmega2560
build_flags =
    -D ARDUINO_MEGA
    ${standard_features.build_flags}
    -O2
    -Wall
lib_deps =
    ${core_libs.lib_deps}
    ${display_libs.lib_deps}
    ${can_libs.lib_deps}
    ${sd_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}

; ============================================================================
; ARDUINO UNO (Static Config Only - Memory Constrained)
; ============================================================================

[env:uno_static]
platform = atmelavr
board = uno
build_flags =
    -D ARDUINO_UNO
    -D USE_STATIC_CONFIG               ; Static build (no EEPROM/JSON)
    ${minimal_features.build_flags}
    -O2
    -Wall
    -Wno-stringop-overflow             ; Suppress false positive on strncpy
lib_deps =
    ${core_libs.lib_deps}
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ; Note: ArduinoJson excluded - not needed for static builds
    ; Note: CAN/SD excluded - insufficient flash space

; ============================================================================
; DEBUG ENVIRONMENT
; ============================================================================

[env:debug]
platform = teensy
board = teensy41
build_flags =
    -D TEENSY_41
    -D USE_FLEXCAN_NATIVE
    -D SD_CS_PIN=254
    -D DEBUG
    ${standard_features.build_flags}
    -Og
    -g
    -Wall
    -Wextra
build_type = debug
lib_deps =
    ${core_libs.lib_deps}
    ${display_libs.lib_deps}
    ${can_libs.lib_deps}
    ${sd_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    https://github.com/tonton81/WDT_T4.git
monitor_filters =
    default
    time
