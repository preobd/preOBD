; PlatformIO Project Configuration File
; Build configurations for different hardware platforms
;
; Feature flags and sizing constants are owned by per-env profile headers under
; src/profiles/. Each env injects its profile via -include. Hardware-derived
; constants (ADC resolution, voltage divider) stay in src/lib/platform.h.
; Framework ring-buffer sizes (SERIAL_TX_BUFFER_SIZE etc.) must be real -D flags
; here because framework core TUs are not reached by -include.

[platformio]
default_envs = teensy41

; ============================================================================
; SHARED CONFIGURATIONS
; ============================================================================

[env]
framework = arduino
monitor_speed = 115200
monitor_echo = no
monitor_raw = yes
lib_extra_dirs = lib
; Exclude sensor subdirectories from individual compilation
; They are included via sensor_read.cpp
build_src_filter = +<*> -<inputs/sensors/>
; Version injection + profile/lib consistency check
extra_scripts =
    pre:scripts/version_inject.py
    pre:scripts/verify_profile_libs.py

; ============================================================================
; LIBRARY DEPENDENCY GROUPS
; ============================================================================

; Display libraries
[display_libs]
lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

; CAN libraries (MCP2515 via SPI - supports multiple instances)
[can_libs]
lib_deps =
    autowp/autowp-mcp2515@^1.0.3

; Sensor libraries
[sensor_libs]
lib_deps =
    adafruit/Adafruit BME280 Library@^2.2.2

; EEPROM/JSON configuration (not needed for static builds)
[eeprom_libs]
lib_deps =
    bblanchon/ArduinoJson@^7.2.1

; CLI library (embedded-cli for command-line interface)
[cli_libs]
lib_deps =
    https://github.com/funbiscuit/embedded-cli.git

; ============================================================================
; TEENSY 4.1 (RECOMMENDED PLATFORM)
; Profile: src/profiles/profile_teensy41.h
; ============================================================================

[env:teensy41]
platform = teensy
board = teensy41
upload_protocol = teensy-cli
build_flags =
    -include src/profiles/profile_teensy41.h
    -D TEENSY_41
    -D USE_FLEXCAN_NATIVE
    -D SD_CS_PIN=254                    ; Built-in SD card
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    https://github.com/tonton81/WDT_T4.git

; ============================================================================
; TEENSY 4.0
; Profile: src/profiles/profile_teensy40.h
; ============================================================================

[env:teensy40]
platform = teensy
board = teensy40
upload_protocol = teensy-cli
build_flags =
    -include src/profiles/profile_teensy40.h
    -D TEENSY_40
    -D USE_FLEXCAN_NATIVE
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    https://github.com/tonton81/WDT_T4.git

; ============================================================================
; TEENSY 3.6
; Profile: src/profiles/profile_teensy36.h
; ============================================================================

[env:teensy36]
platform = teensy
board = teensy36
build_flags =
    -include src/profiles/profile_teensy36.h
    -D TEENSY_36
    -D USE_FLEXCAN_NATIVE
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git

; ============================================================================
; ESP32-S3 (BLE Only - No Bluetooth Classic)
; Profile: src/profiles/profile_esp32s3.h
; ============================================================================

[env:esp32s3dev]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    -include src/profiles/profile_esp32s3.h
    -D ESP32
    -D CONFIG_IDF_TARGET_ESP32S3       ; Explicitly set for chip detection
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/handmade0octopus/ESP32-TWAI-CAN.git
    avinabmalla/ESP32_BleSerial@^1.0.4

; ============================================================================
; ARDUINO MEGA 2560
; Profile: src/profiles/profile_mega2560.h
; ============================================================================

[env:mega2560]
platform = atmelavr
board = megaatmega2560
build_flags =
    -include src/profiles/profile_mega2560.h
    -D ARDUINO_MEGA
    ; Framework ring-buffer tuning — must be real -D flags (not in profile) because
    ; -include does not reach core TUs (HardwareSerial, Wire).
    ; 4 UARTs × (64→16 TX + 64→32 RX) saves ~192 B; Wire (32→16) saves ~32 B.
    -D SERIAL_TX_BUFFER_SIZE=16
    -D SERIAL_RX_BUFFER_SIZE=32
    -D BUFFER_LENGTH=16
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${can_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${cli_libs.lib_deps}

; ============================================================================
; ARDUINO UNO (Static Config Only - Memory Constrained)
; Profile: src/profiles/profile_uno_static.h
; USE_STATIC_CONFIG stays here (not in profile) because it gates source
; compilation via build_src_filter and must be visible to PlatformIO itself.
; ============================================================================

[env:uno_static]
platform = atmelavr
board = uno
build_flags =
    -include src/profiles/profile_uno_static.h
    -D ARDUINO_UNO
    -D USE_STATIC_CONFIG               ; Static build (no EEPROM/JSON)
    -D DISABLE_DEBUG_MESSAGES          ; Save flash/RAM on constrained platform
    -O2
    -Wall
    -Wno-stringop-overflow             ; Suppress false positive on strncpy
lib_deps =
    ${display_libs.lib_deps}
    ; Note: ArduinoJson excluded - not needed for static builds
    ; Note: BME280 excluded - not enabled in profile_uno_static
    ; Note: CAN/SD excluded - insufficient flash space

; ============================================================================
; DEBUG ENVIRONMENT
; Profile: src/profiles/profile_debug.h
; ============================================================================

[env:debug]
platform = teensy
board = teensy41
build_flags =
    -include src/profiles/profile_debug.h
    -D TEENSY_41
    -D USE_FLEXCAN_NATIVE
    -D SD_CS_PIN=254
    -D DEBUG
    -Og
    -g
    -Wall
    -Wextra
build_type = debug
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    https://github.com/tonton81/WDT_T4.git
; Note: monitor_raw=yes inherited from [env], so monitor_filters removed to avoid conflict

; ============================================================================
; HYBRID CONTROLLER ENVIRONMENTS
; These environments enable mixing different CAN controller types on different buses
; Example: ESP32 TWAI (native, bus 0) + MCP2515 (SPI, bus 1) for dual-bus operation
; ============================================================================

; Profile: src/profiles/profile_esp32s3_hybrid.h
[env:esp32s3_hybrid]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
build_flags =
    -include src/profiles/profile_esp32s3_hybrid.h
    -D ESP32_S3
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/handmade0octopus/ESP32-TWAI-CAN.git
    autowp/autowp-mcp2515@^1.0.3

; Profile: src/profiles/profile_teensy41_hybrid.h
[env:teensy41_hybrid]
platform = teensy
board = teensy41
framework = arduino
build_flags =
    -include src/profiles/profile_teensy41_hybrid.h
    -D TEENSY_41
    -D USE_FLEXCAN_NATIVE
    -D SD_CS_PIN=254
    -O2
    -Wall
lib_deps =
    ${display_libs.lib_deps}
    ${sensor_libs.lib_deps}
    ${eeprom_libs.lib_deps}
    ${cli_libs.lib_deps}
    https://github.com/tonton81/FlexCAN_T4.git
    autowp/autowp-mcp2515@^1.0.3
